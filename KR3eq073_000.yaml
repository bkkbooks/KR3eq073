body:
  text: 辨言此編為二十年前舊稿當十七歲時先慈患熱病吐血諸醫競進溫補病寢加劇遷延五十餘日憑几倚坐晝夜不得交睫者二十餘日張口喘息血絲縷縷自齒縫中出齒垢焦黑舌芒刺便祕溺澀渴甚頻索飲童便先師廣西桂林還俗老僧方博齊雷丹峰夫子最後至一診即曰病屬誤藥時機已失不可為矣勉擬大劑白虎湯竟不及救彌留時口不能言猶力注視愚面不少瞬嗚呼慟哉躬歷情境印象最深每一瞑想宛在心目此誠終身之大憾已當是時愚方肆業西營盤官立英文學校遘此慘變深慨乎人子之不可不知醫遂請於先君願輟學習醫先君許焉因從丹峰夫子遊四年卒所業而人事倥傯不遑寧處忽忽有年矣愚先世曾以醫名先君亦嘗修藥濟人不取值顧自中年後遭遇坎坷所業虧折殆盡又以所生子女十一人時惟四兄覺非與愚二人存者先慈在日以是兒致喪明先君亦壯志銷磨不復事家人生産惟其如是故對兄及愚期望愈殷督教愈切嘗詔愚曰人子固不可不知醫矧醫不特可救己更可救人然欲救己救人必仗真實學問欲得真實學問必須腳踏實地刻苦用功否則學之不精識之不廣豈特不能救己救人反足以害己害人害己固不可害人尤不可汝既粗在成就更宜勇猛勤修以求進益凡讀書當知札記潔其綱領撮其旨要參照所得條理記録而存之既以鞭策上進更可備異日檢閲以覘所學進退須知為學如逆水行舟不進則退苟不能刻苦用功世上事業正多何必孳孳此道為也汝當志之愚敬謹遵命因盡發家中所藏醫書百數十種而讀之就其理論治法方藥病案排比類別次第刺取其要加以評騭論斷著録於篇數年成醫論三卷醫話兩卷雜說一卷都十萬言其後先君棄養愚亦營役奔走時而港澳時而鄉邑十餘年間九遷其居器物委棄文稿散佚久不復置念矣近以兄督使刊布歷年治案若干篇以就正當世書將付印忽憶尚有如許舊稿因使家人發箱啓篋而遍搜之僅得此數十則始憶醫論三卷在澳門時為謝君景文取去久借不歸今事隔十餘年已無可追際雜說一卷半飽蟲腹漫濾不堪寓目即此數十則醫話亦僅占原稿三分一強披閲一過淺率簡陋無可為諱誠哉為學之道不進則退二十年來思想播遷學術禪變若是其亟舊日所為良未足當大雅一盼惟習醫之經過如此而焚膏繼晷兀兀窮年之苦況恩之若有回甘重以有此一番嚴命未敢湮沒復恐磨以歲月連此蟲余片段亦散失無可追憶愛於醫案刊印之始略為編次一字不易以存其真附益成書共表於世記其緣起以永其事並書之家乘以勖我後昆民國二十七年五月吉旦盧覺愚謹識覺廬醫話録存古人自序嘗謂讀古人自序即可覘其造詣之精粗與品格純駁而歷代醫字之因革亦大略可見如傷寒論自序悲天憫人之意既真且切蓋仲景當時傷宗族之死亡憫橫夭之莫救乃勤求古訓博採衆方冀於世有所濟故其學之精與其言之切有至相似者孫思邈之千金方千金翼方序文氣度沉椎文辭古雅如見其人第思邈為道家其言每不離玄門色彩如論醫須妙解陰陽祿命相法龜灼五兆周易六壬又所論房中補益服食修養咒禁掌訣皆其證也王祿幼多疾病長好醫術遭逢有道遂躡亨衢登南宮拜東掖繁臺閣由是遍讀弘文館圖籍方書後貶守房陵提攜江上冒犯蒸暑自南徂北染瘴掉攖疴十有六七死生契闊不可問天賴有經方僅得存者故發奮刊削成外臺祕要四十卷讀其序文殷殷以救濟生民為言以利天下為心其不敢苟率將事有由來矣劉河間自序言多玄妙所著原病式以內經病機十九條而暢發其義雖言或偏激為邵元偉所譏而闡發之詳亦足稱者李東垣辨惑論自序寥寥數行言頗自負查當壬辰改元之時正當擾攘之秋居民流離失所飢飽無時元氣既虛易於感病其升補脾陽一法當然有左右逢源之妙其自負固宜儒門事親成於麻知幾之手而無自序丹溪心法為後人輯録金匱鉤玄為戴原禮校補及格致餘論均無序惟局方發揮篇首數言辨晰局方之訛頗為明顯書中議論亦多切理喻嘉言深通佛學序文多釋家言陰病論一篇更足代表之第言多虛泛浮詞滿目蔣式玉謂其好發議論洵不誣也觀其論春溫強分三撅已為尤在涇所譏論青龍二方亦為柯韻伯所鄙第其苦心力學入理頗深醫門法律寓意草皆可傳之作其功未可盡掩張隱菴高士宗道不行時乃隱居錢塘閉戶著書所作傷寒集注會經義以為注解讀其序文謂童而習之白首始獲其要研讀之苦晝之所思夜則夢焉夜之所得旦則録焉經寒暑歷歲月廢寢食絶交遊春花秋月之莫問澄山佳水之弗臨故其書之精博非偶然也黃元御自負古今無雙其為文之牢騷抑鬱與其驕做自負歷歷如見故詆譭前賢強同奪理而立論偏頗惟知補陽雖才宏學博亦瑜瑕參互而竊書之隱更為陸九芝抨擊品格如何可見一斑陳修園在都門時忤某巨公乃罷職歸閩公餘著述成書頗富然其憤世傲慢之性至老不衰觀醫病順其自然說一篇可知且性喜扶陽參地萸麥等陰藥尤深惡痛絶觀景嶽新方砭一書又可知修園自謂讀傷寒論數十年方悟出存津液三字楊素園謂其用藥仍偏辛燥不知所悟者何在亦定論也王潛齊稟性穎悟刻苦自勵其習醫也足不出戶者十年手不釋卷者永夜故見理精而議論博田杏村謂其當時於醫家稱祭酒然其遭遇坎坷觀歸硯録自序感慨蒼涼不忍卒讀意者其不慕榮勢自甘淡薄乃得肆力於醫而宏造就乎醫籍從古至今汗牛充棟茲之所論掛一漏萬勢所難免然歷代醫學沿革變遷習醫者所宜知余嘗欲著中國醫學概論一書以就正醫界先覺惜人事倥傯未暇命筆倘有機緣契合當俟諸異日醫不三世禮記曰醫不三世不眼其藥後人多以父子三世相傳釋之惟漢儒謂神農本草黃帝素問玄女脈訣為三世醫書必盡讀之方為有本之學非言祖孫相傳之三世也王潛齊曰橘旁雜著云醫必父而子子而孫如是則其業精始服其藥若傳至曾玄更為名醫矣其間賢者不待言其不肖者奈何因其世業而安心服其藥設為所誤生死攸關雖愚者不為也況醫道通乎仙道遠數十百年偶出一豪傑之士聰明好學貫微徹幽然其上世並非醫者舍是人而必求所謂三世者有是理乎梁茝林曰古之醫師必通於三世之書一曰申農本草二曰靈樞針灸三曰素問脈訣脈訣所以察證針灸所以去疾本草所以辨藥非是三者不足以言醫俞子容曰古之豪傑自振者不能悉舉若李東垣朱丹溪滑伯仁輩皆非世傳而精造方術屢起危殆著書立言為後世楷模初不聞其父子相傳也是知醫在讀書不在三世明矣葉香岩曰醫者必須天資敏悟又讀破萬卷書而後可借術以濟世不然鮮有不殺人者俞東扶曰習醫何難不過多讀書耳夫學無前後達者為師固不定限以三世否則縱十世何益哉熟讀王叔和不如臨證多熟讀王叔和不如臨證多世俗之言也余謂彼之徒守家傳獨承師訓讀父書而不知通變者固無足取若夫胸無學問者臨證之際既不明致病之源豈能知為治之道如是而求其能收治療之效豈可得哉縱使日夕臨證亦徒傷生害命而已須知讀書與臨證均不可偏廢而讀書以培其學識尤為吃緊之圖俗人之言不足論也吳鞠通曰醫者必先讀書而後臨證始知用方之變化況病有虛實變化萬端治有補瀉方不執一如同一發熱而熱有虛實宜溫宜補宜涼宜瀉不讀書何以知彼虛而此實如大匠之無繩墨不幾悵悵無之耶曹炳章曰先讀書則胸有成竹而後臨證則凡病之虛實寒熱自知有一定之標準而用藥之補瀉溫涼必不至於妄施此亦先理想而後實驗乃必由之徑也斯皆先余而言者益知余言非過矣又俗有行醫須憑時運之說更為悖理果如所言則為醫者只專候時運之至便可為治十全不必讀書矣張隱菴侶山堂類辨曾論及之問世之士幸毋為所惑也古書之遭割據古之醫籍其湮沒既久為後人所得者每竊其言參以已意冒為己作亦有流傳既遠版已殘闕而忘其著者之真名誤以為別人之書者如喻嘉言尚論篇多方中行條辨之語黃元御之新方則竊自松峰說疫書中張元素著保命集後人僞撰序文混入傷寒六書中不知者竟屬之劉河間又脈因證治乃秦皇士所著而刻本則屬之朱丹溪景嶽全書發揮人盡知為葉香岩之書亦有謂是姚頤真所撰者餘外見於冷廬醫話世補齊醫書者辨正尤多至如東垣十書薛氏醫案陳修園七十二種等多非本人自著四庫提要醫家類謂坊賈務新耳目濫為增入以足卷數此則顯而易見者也古書存疑古書所載有荒謬者有缺解音如龐安常捫腹針兒一案夫胎兒在胞豈能手執母之腸胃雖針之得下而立論則乖免腦丸治難産服之則男握左手出女握右手出遑計未消化之藥劑不能奏效而丸入腸胃何能竟入胎兒手中姚蒙診鄒來學以其脈左關滑而緩謂肝第四葉有漏通下故根器上別有一竅出汗水則明屬誇張之詞矣清代異記載咽膈奇方用老蘇梗泡水和麵粉俟日食時在日中搓為丸即日本干則丸皆中空治咽膈奇效他時制之則不然嬰兒初生啼哭一聲後竟默不作聲治法以貓一隻以袱包之持向兒耳邊隔袱咬貓耳貓必大曝而兒亦即應聲而啼胞衣不下用芡葉囫圇不碎者一張煎湯服立效若芡葉裂作兩片者胞衣亦分裂而下此等法古人曾經試驗真不可解也至千金所載禁法掌決串雅所載疔毒徙癰等雖祝由遺意然其事不經且不曾試驗存而不論可也醫家附會之說古來醫家恆多依託之言其事怪誕多不切理如史記扁鵲遇長桑君飲藥以此視病盡見五臟癥結華他中藏經謂他之外孫因吊寢室得之於夢中許叔微夢白衣神勸其習醫劉河間夢道者飲以美酒既醒遂有所悟金史載張元素夢有神人以斧洞其腹納書數卷張景嶽則謂遊東藩遇老人祕授朱明重刻薛氏醫案謂見夢於立齊黃元御著傷寒懸解謂夢境初回恍然而通其義周夢覺著三指禪自云鬼神默為啓迪更謬者陳遠公石室祕録托諸歧伯雷公仲景元化所傳竇林神心書居然自比扁鵲皆欲藉此以神其術而堅後人之信此古來醫家通弊也按扁鵲神心書論治以艾灸為第一服丹藥次之服附子又次之更詆譭仲景不遺餘力立言荒誕不經早為四庫館書所不採惟汪蓮石傷寒論匯言則極推重之考匯言多采喻嘉言舒馳遠陳修園之注而三家於傷寒均好用溫補者則其推重是書意亦可見矣世人好溫補之非人情畏虛補死無怨此張信堂述徐靈胎之激論也今則溫補之說猶牢在人心舉世滔滔如飲狂藥故喻嘉言先議病後議藥之說今則竟成絶調矣夫有是病服是藥藥得其宜硝黃即為補藥失其宜參術亦為毒若必以參朮為補失之遠矣須知溫補不過治病之一法雖不可廢但非可盡治諸病也蓋凡病未必皆虛即虛矣未必盡為寒證而溫補之藥只可以治陽虛不可以治陰虛凡陰虛之病脈見虛促細數者悉宜清滋不比虛寒之脈浮大無力之宜溫補者也設陰虛之證而投以溫補不死何待雖然世人相習成風原無足怪獨醫者亦徇隨俗好意用溫補從未有別其證之當補當瀉宜溫宜涼而隨證以用藥者不亦可怪哉王潛齊曰古人詳於治寒略於治溫故好用參耆者每謂甘溫能除大熱而投之陰虛之症則其弊立見蓋參耆能除之熱乃脾肺虛寒之熱非肝腎陰虛之熱也魏玉璜曰凡産後陰虛血少之病第以二地二冬杞子一切養營之劑投之無不立愈若氣血兼補雜以薑附剛劑非擔延時日即貽病者後患矣葉香岩曰內經言勞者溫之謂溫存以養使氣自充若甲熱藥為溫補大失經旨矣李東垣亦有熱藥耗人元氣之誡奈何世之好用溫補者竟不一思哉小兒之病多由不善防護所致小兒骨肉柔脆臟腑嬌嫩血氣未充精神易動防護不易調治亦難而病苦不能自言全憑醫者之意以為推測幸而得則得矣否則魯莽施治貽患何堪故非確知其病情毋寧守不服藥為中醫之誡昔張子和告陳敬之以蒸餅泛丸給妻妾以為真藥使兒服之以俟天命蓋取其不傷胃氣兼有化氣消滯利水之功遠勝誤服別藥也且小兒之病多由將理失宜或間接由母體感受而成苟知其故自能預為防護觀顱囟經曰初生小兒乳劑如膠是母寒氣傷胃乳劑如血是母胸有滯熱兩眼赤者是在胎時母吃炙爆熱面擁滯氣入胎中熏兒腦所致孩子無故煩渴由飲乳猛衝損肺無故肚大項細四肢消瘦筋脈骨節弛緩是因母乳少嚼飯與吃遂成骨熱疳癆行走遲者是少時抱損夏熱時乳母沐浴多使冷水乳得冷氣血氣皆亂氣未定便與兒乳使兒胃毒及成赤白惡痢師巫燒錢乳母須預祝之勿令著水噴兒致令驚熱入心轉成患害凡此皆醫書所未載者後薛鎧保嬰撮要其論乳下嬰兒有疾必調治其母母病子病母安子安且云小兒苦幹服藥亦當令母服之藥從乳傳其效自捷錢仲陽亦謂糞溺不可近褪褓小兒蓋恐其為穢氣所觸也其意悉與顱囟經合爰録於此以告為人父母者聖人不治已病經云聖人不治已病治未病謂治病於未傳非無病而服藥也如金匱謂見肝之病當先實脾者是後人縱情聲色耽於逸樂汲汲惟恐不足黯者又倡為房中之術服食之藥以投其所好獨不思藥猶干戈耳無病而服藥是鑄兵也烏乎可袁簡齊謂享長年者生平不服丸散惜世人不悟耳蓋無病而服藥者原自有說裴兆期曰人之一身無非病也亦無非藥泥金石鳥獸蟲魚為藥偏矣亦後矣飢飽待時飲食藥也寒溫適所衣服藥也動靜有常起居藥也色不視邪則甘明聲不聽淫則耳聰口無莠言行無顛步則口體正均藥也使有人焉知填精而不知寡欲知養氣而不知守默知保神而不知絶慮亦焉往而得藥至如逸可治營靜可治躁處陰以避暑就懊以避寒凡此之類皆隨在而得之之聖藥遠勝草根木皮萬萬其如世人之不肯服食何用方須知藥雖與病合而病重藥輕者非可求效於一二劑之間若不明其故見其不效又即轉方朝寒暮熱朝攻晚補漫無主宰必致誤人徐靈胎曰病之中人愈必有漸不可因無速效而即換方也況所服之方或未盡善不思於前方損益萬當而遽求變法皆胸無定見之故然有病與藥不合亦見小效者必須明察其故急當轉藥切勿以有小效而不思變法也劉河間曰有病鬱熱甚而反惡寒得寒較甚得暖少愈者謂暖則腠理疏通而陽氣得散怫鬱稍退故小愈然藥力盡則病必反甚也減病則微加病則甚俗無所悟但云服之而獲效力盡而病加因而加志服之由是諸熱證皆生矣此兩說均醫者所當知故並録之古方宜忌古人治病類多各明一義如東垣善治勞倦致虛脾陽不升之病故用藥多升補子和以汗吐下盡賅治法故力表獨聖雙解舟車神佑之功他如河間之主火丹溪之主痰濕熱亦然在當時善用某種藥而獲愈者多便以為天下各病悉皆同病而其治法可以盡治天下各病矣故其議論方藥每每表彰過甚古醫書類多如此全在後人之能洞達其理融會而貫通之勿泥執其說而誤人也至於東垣之升補果遇脾陽不升之病自然奏效子和之三法果是實證自是不可廢若以升補之藥而概用之溫病以汗吐下峻劑而泛施於虛證其禍可忍言哉夫藥有定性熱治寒寒治熱不可假借也雖有監製佐使等法亦仍利用藥之偏性以為治故用熱藥能治之病皆寒病也以補藥能愈之病皆虛病也豈有熱藥能治火病補藥能瀉實病者昔聖散子一方固燥熱霸劫之劑也只以東坡之言遂至天下盲從流禍萬世俞子容辨之詳矣醫者必須知此義自不為古書所惑醫不執方醫貴變通尤貴識證如傷寒論熱入血室三條一刺期門一無犯胃氣及上二焦待其自愈其出方者只有小柴胡湯一方後人凡遇此證必援用之竟不思是方有參夏薑棗之辛甘溫以之治熱入血室豈可輕投嘗讀沈堯封女科輯要治熱入血室兩案一屬胃液乾燥用白虎加生地麥冬繼與麻仁丸一則病從怒起用膽草黃芩山梔丹皮羚羊角蘆薈甘草當歸其治張女一案用腎氣丸即自謂似是實非之症不可不辨其不膠守小柴胡一法可謂善變通矣又金匱治陰吹用豬膏發煎取其潤腸而氣自順不轉趨於前陰耳而吳鞠通醫醫病書一書治陰吹者三案皆用辛溫藥獲效設必泥豬膏發煎一方而不詳辨脈證安有愈理乎舉一反三識此以例其餘服藥煎藥之法古醫者於藥之服法煎法均有研究如傷寒論之麻黃證則覆取微似汗桂枝證則服藥後驟熱稀粥以助藥力五苓散證則多飲暖水柴胡瀉心諸方則去渣再煎炙甘草湯則用酒水合而久煎餘外分煎合煎先煮後入等尤宜博考蓋藥雖對症而煎服不合法亦難奏效或反害之如服麻黃湯不溫覆取汗則邪從何去然或取汗太過則虛其衛陽交自變證矣至若桂枝雖性本辛溫其實不能出汗楊素園曾論之苟非借熱粥以助藥力豈能令其漐漐微汗乎若五苓散證之飲暖水亦猶桂枝症之啜熱粥而柴胡瀉心諸方醫者多不知去渣再煎之法炙甘草湯只以水煎數沸即飲諸如此類不勝記載觀徐靈胎醫學源流論及慎疾芻言自知又繆仲淳曰凡諸煎湯必先以主治之君藥先煎數沸然後下余藥文火緩緩熬之勿揭蓋煎畢連罐取起坐涼水中候溫熱服之庶氣味不泄若遽乘熱揭封則氣泄而性不全煎時不宜烈火其湯騰沸耗蝕而速藥性未盡出而氣味不純人家多有此弊反責藥不效咎將誰歸又曰凡服湯藥雖品物專精修治如法而煎藥者鹵莽造次水火不良火候失度則藥亦無功觀夫茶味之美惡飯味之甘褐皆繫於水火熟飪之得失即可推矣王秉衡曰凡清解之藥煎須急火則氣尚存若緩火煎濃即全失清涼之味矣此則各有攸宜可補徐氏所未及特載於此以告醫者某藥人某經張元素著臟腑標本藥式王海藏集湯液本草多以某藥入某經某經用某藥為言余竊疑之而未有說也後讀徐靈胎醫學流源論謂人之血氣無所不通而藥性之寒熱溫涼有毒無毒亦一定不移入於人身其功能亦無所不到豈有某藥只入某經之理蓋人之病各有所現之處而藥之治病必有專長之功如柴胡治往來寒熱能愈少陽之病桂枝治惡寒發熱能愈太陽之病葛根治肢體大熱能愈陽明之病蓋其愈寒熱已畏寒除大熱此乃柴胡桂枝葛根專長之事因其能治何經之病後人即指為何經之藥孰知其功能實不僅入少陽太陽陽明也故以某藥能專治某經之病則可以某藥為獨治某經則不可謂某經之病當用某藥則可謂某藥不復入他經則不可也後再讀鄒潤安本經疏證以方論病以證論藥以藥論方反復推勘一掃本草諸家龐雜蕪穢之言而歸於至當由是知張王二書之未可心准也又如沈芊緑謂今人治瘧必用柴胡若其瘧果發於少陽服之自愈若系他經用之則必使他經之邪展轉而入少陽遷延以斃云余謂小柴胡湯中參夏薑棗皆辛甘溫之品投諸溫熱暑濕時瘧當然誤事然其咎不僅在柴胡也且謂柴胡為少陽經藥他經病而誤用之以致邪入少陽何不仍以柴胡治之昔華他論傷寒謂熱毒在胃外未入於胃而先下之者其熱乘虛入胃則爛胃也然熱入胃病要當須復下之不得留於胃中雲是則先以下早而傷胃後則仍當復下以救其誤彼誤服柴胡而邪入少陽固可援引此例何至遷延至斃蓋芋緑所言實有語病與元素所謂早服葛根反引邪入陽明同一無稽也藥有特性丁氏叢書醫界鐵椎曰人類雖瞑目於地下猶有使世界人類永不消滅之希望宇宙間之萬物如此各逞其欲望雖死不易其初心不問其有生活力無生活力是有機體非有機體凡物莫不向其所有之特性而進行不已如水蛭虻蟲古人以之配藥疏滌瘀血號下瘀血湯能下瘀血貼於急性化膿炎症能速化膿速破潰容易流出膿汁是即其死後猶具生前特性之徵也番木鱉為為諸動物之毒物特於犬鼠等尤甚古人以之配藥治犬毒病鼠毒病此亦向其自然性進行不已之徵蛇畏蜈蚣蜈蚣畏蟾蜍蟾蜍復畏蛇相畏相制循環不已唐宗海本草問答以五行之理釋之雖未足為訓然亦可見物之各有特性故能相畏相制也琥珀拾芥磁石引針則又以所含之電力有陰陽之異耳吳又可溫疫論謂蟹得霧則死棗得霧則枯此則以氣質而相制喻嘉言尚論篇謂雞瘟死雞豬瘟死豬牛馬瘟死牛馬於人亦然此則感受其同類之厲氣使然而又足見氣與質之互相感應也王秉衡重慶堂隨筆謂葭管飛灰惟河南縣之葭應候而飛足見藥之所産各有土地之宜而物性亦各有專長如蜜能固密護內酥能融化攻堅又各有所制如以醋浸象牙一宿則軟如腐再用木賊水煮之則堅如故白銀觸倭硫磺則色黑犀羚之角畏人氣珍珠畏尸氣並不近鐵與柏木梨與蘆蔔同藏冬採橙橘藏緑豆中皆不壞銅以鳧茈水煮可刻字木槿葉揉水浸絲則不亂桃杏仁可澄水血汙衣嚼蘆蔔擦之則潔墨汙衣生半夏或白果杏仁杵爛揉之則去圍爐炭烈分開易滅不分易熾用草紙一張覆於火頂燒過存灰則火不焰而四布嚴冬向火惟桑柴炭不燥皮膚此足徵物各有特性其特性之表露即其物之效用也在人能知其所以然而善用之耳又方書所載藥忌食忌等尤不勝縷述凡此之類皆當博考治血病用炭藥醫治血病多用炭藥謂血見黑則止也所用多斂澀之品流弊之多惟葛可久十灰散尚稱平穩蓋彙集止血行瘀清熱之藥成方初非斂澀之謂也且用炭藥亦有分別趙晴初曰樓全善醫學綱目治血崩用香礬散以香附醋浸一宿炒黑為炭存性每兩入白礬末二錢米飲空心調服此氣滯者用行氣炭止之也五靈脂散用五靈脂炒令煙盡為未每服一錢溫酒調下一法每服三錢水酒童便各半盞煎服名抽刀散此血淤者用行血炭止也荊芥散用麻油點燈多上燈芯就上燒荊芥焦色為末每服三錢童便調下此氣陷者用升氣藥炭止之也治崩中不止不問年月遠近用槐耳燒作炭為末以酒服方寸匕此血熱者用涼血藥炭止之也如聖散棕櫚烏梅各一兩乾薑一兩五錢並燒炭存性為細末每服二錢烏梅酒調下空心服久患不過三服愈此血寒者用熱血炭止之也棕櫚白礬煅為末酒調服每二錢此血脫者用澀血炭止之也同一血崩證同一用炭藥而條分縷晰如是治病用藥首貴識證可以一隅三反矣産後與生化湯婦人産後必服生化湯云以消瘀外此如吾管俗更服吳萸薑醋等動輒數兩以至數十斤似非此不足以復其元氣者而易思蘭謂瑞州之婦産後必以胡椒炒雞為饌是則更有甚焉者矣故余嘗謂婦人産後有病強半由俗例釀成非過論也丹溪局方發揮曰初産之婦好血未必虧汙血未必積臟腑未必寒何以藥為飲食起居勤加調護何病之有或有他病當求病起何因氣病治氣血病治血寒者溫之熱者清之凝者行之虛者補之血多者止之是故産後無病只當以糜粥清湯將養不當亂投藥餌尤不當投以種種僭熱之品且人之體質萬有不齊分娩時日亦不一致即使有病亦須察其有無夾雜外邪食積痰瘀尤當細審何可概以生化湯為不祧之方哉蓋是方重用芎歸之辛溫走竄原為血寒而滯者設若血虛而熱之體即不可誤服吳鞠通王潛齊論之詳矣惟陸九芝謂是方為婦科要藥原方炮姜只用四分不過藉以行氣之用助芎歸桃仁以逐瘀生新而甘草輔之寒固可消熱亦可去後人不善會其義見方中有炮薑炭遂援其例而用於薑生薑桂附丁萸等物且更有將川芎桃仁疑前人之不通而去之於是生化湯遂多變相直謂生化湯不可用不知此說之不可用者即此變相之生化湯非此但用四分炮姜之生化湯亦非以芎歸為治之生化湯也然陸記其先人治唐春鈴一案盛夏畏冷以麻黃三分附子三分甘草一分與之果一服解一裘兩服而重裘皆弛夫七分之藥既可以愈病反之亦何嘗不可以增病蓋劑雖有輕重而藥之性不殊也彼變相之生化湯固不可用即只用四分炮姜之生化湯仍有大劑芎歸詎可輕用乎其謂寒固可消熱亦可去恐無此理雖然昔人善用生化湯加減以治産後各病者以傅青主閻純璽計壽喬等為最著蓋必審之真而辨之確斯能無弊耳用是方者宜知之麻桂兩證桂枝證之自汗麻黃證之無汗其所以然之故醫者聚訟紛壇靡所依歸余考泰西生理諸書謂飲食入胃賴消化作用變成乳糜由小腸之微細管吸收之匯歸吸收系流入回血管入心過肺與氧氣化合生出熱度以維持體溫復賴心臟循環作用使血液周流全體於是各臟器即就血液中吸取滋養料以維持其生活而血液又吸收各臟器之廢料運往各排泄機關而排除之彼皮膚之汗液口鼻之碳氣與乎糞溺涕唾皆是此所謂新陳代謝作用無須臾之停者也皮膚有無數之汗孔為廢料排泄之路若一旦感受寒氣則皮膚收縮汗孔閉緊初則凜凜惡寒繼則體中熱度不能排泄於外則積而發熱且因其汗孔閉塞汗液不能通至皮膚故始終無汗此麻黃證也若桂枝證雖同為皮膚感寒所致不過汗液尚能通至汗孔而熱度之蒸發自能隨汗液外泄故發熱不比麻黃證之甚而惡寒亦較減故楊素園謂此證雖一月半月不解仍無變證者也反觀麻黃證因熱度與汗液不能排泄而鬱結於裡故變證恆多至表證之解與未解全在惡寒上別之世醫多能辨此惟有裡熱已發惡寒未盡解雖遍身大熱日日出汗寒自不動周學海謂宜扶正氣兼用行血通絡之品乃能發疹而愈非只表散能治此則同中有異故附録及之輪回酒世有血征服童便者百無一死服寒涼者百無一生之語更有創為輪回酒者愚人誤信貽害不淺王秉衡曰小便必用童子者取其智識未開而無妄動之火也尤須淡薄滋味不食葷膻去其頭尾但以中間一段清徹如水者始有功效若煉成秋石昔人尚謂其中寓暖氣在所不取何後人妄造輪回酒之名令病人自飲己溺夫人既病矣溺即病溺以病溺猶堪治病則無病之溺皆可為藥何必取童子戒葷膻去頭尾欲清徹而故難其事哉蓋人雖無病其飲食之精華皆已化為氣液其糟粕則下出而為便溺以二便為濁陰之出路也可見病人之便濁陰中更有病氣雜焉再使病人飲之是以既出之病氣更助以濁陰之汙氣仍令入腹殆不欲其病之去乎況病人之溺臭穢必甚於平人極能敗胃若溺色清徹者則其病非寒則虛治宜溫養更不可令飲己溺矣其辨析最詳足破世俗之惑爰備録之以警世焉宣通之義方有七大小緩急奇偶復也劑有十宣通補瀉輕重滑澀燥濕也王好古補寒熱二種其用乃備顧俗醫多以宣為瀉劑者抑不思十劑中已有瀉劑又以宣為通劑音抑不知十劑中已有通劑舉世皆曰春宜宣以為下奪之藥抑不知仲景曰大法春宜吐內經曰高者因而越之木鬱則達之宣者升而上也以君召臣曰宣義或同此傷寒邪氣在上宜瓜蒂散頭痛蔥根豆豉湯傷寒懊憹宜梔子豆豉湯皆湧劑也乃仲景不傳之妙故以宣訓吐確而有理因節録子和之說以明之至於通劑王荊公曰治法云諸痛為實痛隨利減世俗以利為下也假令痛在表者實也痛在裡者實也痛在血氣者亦實也故在表者汗之則愈在裡者下之則愈在血氣者散之行之則愈豈可以利為下乎宜作通字訓則可此說雖非因通劑而發然以通釋利義亦明顯可互參也上下異治仲景諸瀉心湯寒熱並用開後人無窮法門蓋寒熱之邪交結不散藥難偏用非此不可也然病或有上下虛實不同寒熱攻補不一者又當另求治法矣間嘗閲昔賢醫案頗多成法可遵如孫文垣治陳松奕五更胸膈脹痛寒熱溫涼遍投不效診之右寸軟弱左平兩尺亦弱病屬肺腎兩經不足法當補而斂之用人參鹿角霜故紙萸肉杜仲巴戟山藥茯苓車前以鹿角膠酒化為丸空心淡鹽湯送下又以御米殼煨訶子陳皮蜜丸五更枕上服之白湯送下一月而愈王潛齊謂人參鹿角之丸佐以茯苓車前是導之下行以斂虛氣之上逆故不用蜜丸而送以鹽湯粟殼訶子之方丸之以蜜服於枕上是使其留戀胸膈以斂肺化痰用藥之法絲絲入扣又陸養愚治陸前川素患腸風便燥冬天喜食銅盆柿致胃脘當心而痛醫以溫中行氣之藥療其心痛痛未減而腸紅如注以寒涼潤燥之藥療其血便未通而心痛如刺屢易醫而技屢窮其脈上部沉弱而遲下部洪滑而數乃胃中積冷腸中熱也先以潤字丸三錢以沉香末三分衣其外濃煎薑湯送下二錢半日許又送一錢平日每服寒涼藥胃脘必痛如割今兩次丸藥胸膈竟不作祟夜半便行極堅但不甚痛血減平日十之六七少頃又便一次微痛而血亦少便亦不堅清晨又解一次微見血而竟不作痛矣惟心口之痛未愈因為修合臟連丸亦用沉香為衣薑湯送之以清下焦之熱而潤其燥又以附子理中料為散以溫其中飴糖拌吞之取其戀膈不使速下不終劑而兩病並愈盧紹庵謂其妙在丸散異治蓋丸者緩以達下不犯中宮散者過咽即消溶不犯魄門之熱更妙在沉香飴糖合成其功陸又治陳曙倉妻咳嗽吐痰有血夜熱頭眩胸膈不舒腳膝無力醫用滋陰降火藥已半年飲食漸少精神漸羸其脈兩寸關沉數有力兩尺澀弱而反微浮乃上盛下虛之證上盛者心肺間有留飲瘀血也下虛者肝腎之氣不足也用人參固本丸令空腹時服之日中用貝母蘇子山查丹皮桃仁紅花小薊以茅根煎湯代水煎藥服十劑痰清血止後以清氣養榮湯與固本丸間服三月後病痊而受孕盧紹庵謂上盛下虛之證比比治之見效者寥寥蓋此證必下虛培之上盛抑之上下攻補並行不悖乃能隨施輒效耳王潛齊治程芷香春日病溫而精關不固旬日後陡然莖縮寒顫醫欲以附補之王謂其平日體豐多濕厚味釀痰是以苔膩不渴善噫易吐而吸受風溫即以痰濕為山險乘其陰虧陽擾流入厥陰甚易豈容再投溫補以劫液銅邪而速其痙厥耶乃於午後進肅清肺胃方以解客邪蠲痰熱而斡樞機早晨投涼腎舒肝法以靜浮越搜隧絡而守關鍵病果逮減奈善生嗔怒易招外感不甘淡薄反復多次每次必莖縮寒顫甚至齒縫見紫血瓣指甲有微紅色溺短而渾黑極臭幸其上焦已清中焦已運亟宜填腎陰清肝熱以西洋參二冬二地蓯蓉花粉知柏連楝石英斛芍三甲阿膠雞子黃之類相迭為方大劑連服二十餘帖各恙漸退繼以此藥熬膏晨服午用繆仲淳資生丸各品不炒皆生曬研末竹瀝為丸枇杷葉湯送下服之入秋始得康復楊素園謂此乃四損症之最重者治法稍不善即變症紛如便不可保矣王氏又治屠敬思素屬陰虧久患痰嗽動即氣逆夜不能眠頻服滋潛納食漸減稍沾厚味嘔腐吞酸其脈左弦而微數右則軟滑兼弦病由水常泛濫土失堤防肝木過升肺金少降良由久投滋膩濁濕內燔無益於下焦反礙乎中運左強右弱升降不調以蓯蓉黃柏當歸芍藥熟地丹皮在苓楝實砂仁研為末藕粉為丸早服溫腎水以清肝以黨參白朮枳實菖蒲半夏茯苓橘皮黃連蒺藜生曬研末竹瀝為丸午服培中土而消痰暮吞威喜丸肅上源而化濁三焦分治各恙皆安徐然石謂上下分治原有矩當隨證而施如此案是也徐靈胎批葉案亦謂醫能煎丸異藥上下異方則治無不順故此等治法醫者所當博考也表裡相通素問咳論曰皮毛者肺之合也靈樞本輸篇曰肺合大腸又曰腎合膀胱膀胱者津液之府也少陰屬腎腎上連肺故將兩藏生理學謂皮膚與肺臟同營呼吸作用所以排碳氣而吸氧氣者也而皮膚又與腎臟之泌尿機能有密切之關係彼徒知肺司呼吸而不知皮膚於排汗之外其吸引力亦最強彼知皮膚有排汗功用而不知其與腎臟有盈虧關係者是皆未了然人體臟器之生活狀態者也人身體溫無論冬夏皆能保持常度並無增減其有自覺寒熱者不過感觸天空氣體之殊常耳故夏熱則人身之血液流往肌膚者多而排汗亦多冬寒則皮膚收斂汗液排泄於外者自少此類之廢料仍隨血流返腎臟賴其泌尿作用將之濾出由輸尿管下輸膀胱為溺故夏日汗多而冬日溺多何夢瑤謂夏日陽外泄則汗出而內涸冬月氣內斂則化水而陰充亦是此義又考外感諸證肌表不通碳氣容積於裡者多勢必影響於肺臟之呼吸觀桂枝證之鼻鳴麻黃證之乾嘔麻杏石甘證之氣喘可知不特此也表證未解影響於腎臟者亦絶巨彼膀胱蓄水之五苓散證血結精室之桃核承氣抵當諸證雖有表裡先後不同何莫非由皮膚間接波及乎若汗液不能排泄於外表證仍屬未解腎臟又不能將血液中之水量濾而為溺於是此應排泄之水量乃滲入大腸而下利則又屬葛根證矣察其挾熱則葛根芩連挾寒則人參桂枝雖寒熱不同而病因則一若不下利而但嘔者則又氣體上衝所致彼葛根證原有不下利但嘔者之文故不必治利不必治嘔但察其由表病未解而轉屬者一解其表而利與嘔自止矣於此足見皮膚與肺腎膀胱大腸之相為表裡而亦可見病傳之必有所因彼之頭痛醫頭腳痛治腳者安足語此攻補兼用裴兆期曰凡用補藥必兼瀉邪邪去則補藥得力古今醫案按選載丹溪治葉名儀痢疾案先投以參朮陳皮芍藥等數劑奈藥日投而病日甚遊朋譁然後始以小承氣湯飲之遂愈問故曰前診氣口脈虛形雖實而面黃稍白此平素與人接言多多言者中氣虛又其人務竟己事恆失之飢而傷之飽傷於飽其流為積積之久成為痢疾夫滯下之病謂宣去其舊而新是圖而我顧投以補藥十餘帖安得不日以劇然非浹旬之補豈能當此兩帖承氣哉故先補完胃氣之傷而後去其積則一旦霍然矣然此乃飢飽勞役之虛痢故可先補而後瀉況其所謂補者參朮之中仍助陳皮芍藥以調氣破滯並非後人之重濁蠻補之藥蓋深得補中兼攻之法以裁方者又古人治虛中夾實之病凡用攻藥必兼以補藥助胃氣而行藥力如黃龍湯中用參則硝黃得鼓蕩之功其破敵之力愈鋭此旨惟張石頑千金方衍義一書闡發最詳醫者不可不讀也瀉痢異治內經言腸澼昔人謂之滯下即今之痢疾也古無痢字與泄瀉同以利言惟證候各異治亦不同尤在涇曰泄瀉多起寒濕寒則宜溫濕則宜燥也痢病多由濕熱熱則宜清濕則宜利也雖泄瀉亦有熱證然畢竟寒多於熱痢病亦有寒證然畢竟熱多於寒是以泄瀉經文必傷脾陽而腫脹喘滿之病生痢病經久必損其陰而虛煩痿廢之疾起痢疾兜澀太早濕熱留注多成痛痹泄瀉疏利或過中虛不復多作脾勞兩者不同於斯可見後人未達其義混同論治競用溫補張景嶽其尤者也雖泄瀉門中原有溫補之法張景嶽其尤者也雖泄瀉門中原有溫補之法但非治瀉之全法更不可概施於痢病也考之仲景以熱痢下重渴欲飲水主以白頭翁湯譫語有燥屎下利脈反滑主以承氣湯張潔古發調氣行血之論創芍藥湯皆以痢言蓋痢病無不裡急後重或血或膿腹痛口渴者與泄瀉之病原易分別即濕傷血分之痢口不渴腹不痛亦必裡急後重小便短少而脈數劉河間主以黃連湯陸定圃嘗言其效然則瀉痢兩證其可混而莫別乎滋陰降火地黃龜板知母黃柏為大補陰丸俗醫執方施治每每僨事非方之不善實用者之不善耳方中地黃龜板補陰知母黃柏降火以治陰虛火亢脾胃實而便艱者確切不移故好用溫補之陳修園亦盛稱其妙蓋陰虛固宜滋火亢亦宜降若只滋陰而不降火則病豈能愈葉香岩曰譬如釜中之水灶底之火火旺則水煎乾頻加其水火終不退莫若加水而釜底抽薪自然釜中之水不於薛時平曰凡水虛火實之甚者非滋陰降火之劑兼致其力不能盡治法之要妙素問謂諸寒之熱者取之陰所謂求其屬也王冰注曰壯水之主以制陽光夫以寒治熱而熱不除者由乎真水不足不能制其火故也水之主腎也壯者滋益之也必當滋腎水之不足彼苦寒之藥能瀉火者不過折其威勢而使之暫伏耳終不能使其不再作也然病非因陰虛者誤眼滋陰之藥每致嘔悶減食病不因火亢而服知柏者每致傷胃泄瀉此則用藥者之責不可歸咎於藥也補陰發表補陰發表之說創於張景嶽藥用理陰補陰溫中等方補血散寒使邪從榮解後賢如尤在涇楊玉衡皆盛稱之惟葉香岩深叱其謬謂內經雲氣味辛甘發散為陽豈有陰柔膩滯之藥而能發汗者言亦有據然則張說是乎抑葉說是乎余謂葉說據理言之固當而張氏之法亦未嘗不是也觀王潛齊治羅元奎患傷寒脈極虛細陰血太虧不可徒攻其病乃用當歸熟地芍藥炙草橘皮柴胡等藥一劑而愈此即景嶽五柴胡飲也魏玉璜治陳士華感冒案謂病前因誤藥傷其津液外邪乘虛內結故以大劑甘潤之品如二地杞子等藥投之即借其熱結之力蒸鬱勃發乃一湧而汗出邪散此所謂內托之法也按此與景嶽雖用藥不同而法則相同是則張說未為厚非故醫者治病總須隨證而施勿徒守一說也血脫益氣血脫益氣乃血證門中治法之一蓋血以載氣血盡而氣將隨之此時補血既不能驟生惟先固其氣氣固血止再商治法然亦為氣不攝血可用參耆之證言之耳設外受熱迫內因火動而致諸般失血亦難概援此例也顧曉瀾治徐氏婦吐血傾盆數日不止危如纍卵病雖因鬱火久蒸肺胃復緣暑熱外迫惟苦寒之藥到口即吐其為虛火可知故借用八汁飲意純取甘寒冀其入胃清上先止其血乃以蔗藕蘆根白果蘿蔔水梨西瓜鮮荷葉等生取汁和勻燉熱與服不住口緩緩灌之血遂止惟神倦懶言奄奄一息脈雖稍平右愈浮大無力此血去過多將有虛脫之患始以當歸補血湯合生脈散意裁方煎成仍加入諸汁服之而愈王潛齊治陳秋槎年六十八歲忽大便驟下黑血數升繼即大吐鮮紅之血汗出神昏肢冷搐搦躁亂妄言其脈左手如無右弦軟僉慮其脫將煎參湯灌之矣王氏急止之謂高年陰分久虧陰血大虧而風陽陡動殆由忿怒兼服熱藥所致耳詢之果然乃以西洋參羚羊犀角生地銀花緑豆梔子元參茯苓茅根為劑衝入熱童便灌之外以燒鐵淬醋令吸其氣龍牡研粉撲汗生附子搗貼湧泉穴以引納浮陽兩服血止仍以是法加減半月後始解黑燥屎便溺之色皆正以滋補藥善後而愈讀上兩案其先後緩急之序辨證用藥之妙堪為師法益可見治病不可徒守一說也陽生陰長內經陽生陰長之說本為寒證而發所謂無陽則陰無以生也更有無陰則陽無以化之語正與此相對待後人斷章取義而好用溫補者遂援陽生陰長一語為口實竟欲以此一法盡治天下寒熱各病實古人所不及料如喻嘉言寓意草治金鑑一案魏玉璜謂其病於春月故曰春溫其實乃是傷寒若屬溫病斷無用麻黃附子細辛湯之理是固然矣不知喻氏指為溫病者亦自有故蓋喻氏嘗謂今人見熱勝煩躁之證而不敢用附子者惡其以熱助熱也不知不藏精之人腎中陽氣不鼓津液不得上升故枯燥外見才用附子助陽則陰精上交於陽位如釜底加薪則釜中之氣水上騰而潤澤立至矣其持論如此固無怪其謂金鑑為病溫不知其論乃陰凝之枯燥故可用溫藥非所論於陰竭之枯燥也尤在涇嘗辨之矣設金鑑果屬溫病則現證如彼陰液已竭投以麻附不死何待此亦誤會陽生陰長之義者虛損須知楊素園曰虛損之病多由陰虛其證無不潮熱咳嗽吐血減食脈來細數者治法固以滋陰清熱為主然滋而不滯清而不寒且時時照顧脾胃方不犯手但得脈象日和飲食漸增即是生機至陰氣已充可以用參耆時而其病已愈矣從古醫書專重扶陽每云不服參耆者不治脈細數者不治豈知能服參耆之證愈之甚易固不勞諸公之暢發高論也至陰虛而脈細數者誤服參耆則陰竭而死故古人皆謂不治然調治得法亦有生者未可盡諉於不治也至於景嶽立齊輩亦有補陰之論特專任重濁膩滯之品機樞愈窒去生愈遠使人愈信扶陽之說為不誣而虛損之證遂萬無愈理又古今醫案按載葉香岩治黃公子勞病案王潛齊辨之曰上損下損皆以脾胃為扼要固治損之大旨也然亦此人脾胃素弱故病前先有泄瀉而病後調理於天暑時服生脈散獨囑云便溏則停也設病肝腎真陰不足能食便艱者亦不能捨滋濡之藥為治矣故醫者治病必先辨證而後議藥也又冷廬醫話載海鹽寺僧能療一切虛損吐血勞傷干勞之證此僧不知神農本草黃帝內經惟善於起居得宜飲食消息患者住彼寺中三月半年十愈八九此蓋以怡養性真調節飲食之法助藥餌之不及耳然虛損之證病熱重者脾胃必傷飲食已難運化精血無以資生又加偏熱偏寒之藥即使對證亦恐更傷脾胃至曰怡養性真不知患此者多心若忘猿情難自禁安能使其心如止水天君泰然者哉故病淺者原易調治重者雖神醫無益奉勸世人宜早猛醒引火歸源今醫治相火之證動用桂附輒云引火歸源不知相火寄於肝腎上應心包心動則相火妄行勢必爍及真陰肝腎陰虛則相火愈熾故秦皇士謂乙癸同源治宜培養肝腎真陰以制之若用辛熱攝伏豈不誤哉夫引火歸源而用桂附者乃治真陽不足無根之火為陰邪所逼失守上炎如戴陽陰燥之證而已葉香岩曰引火歸源因腎水不足虛火上亢用滋陰降火之法少加熱藥為嚮導引之下降使無拒格之患若以溫補之藥為引火則大誤矣蓋陽為火陰為水水衰陽無所附而浮於上者宜滋補真陰則孤陽下附若可用熱藥者乃戴陽格陽二證是內真寒而外假熱陰極似陽仍是寒證故用熱藥此處務要講究明白何夢瑤曰桂附引火歸源為下寒上熱者言之若水涸火炎之證上下皆熱治宜六味丸之類補水制火若動用桂附為引火不知引歸何處以上數說明白曉暢足破俗醫之惑爰録之以為世戒舌辨寒熱舌為肉質其色本紅熱則赤甚則絳寒則淡甚則白熱則液涸故舌焦寒則濕聚故舌潤外邪入里與痰涎穢濁相合則生胎苔故外感者舌無苔有苔則邪已入里矣邪從外入其苔由白而黃而黑其體由潤而燥而焦若伏氣從里發則初病之時舌或無苔但舌色必赤舌體必燥伏邪既化苔乃漸露然投藥不差則苔亦漸化由厚而薄由焦而潤由黃而白故舌色可測病之寒熱舌苔可辨邪之進退也推之雜證驗舌亦為至要如楊乘六治沈某父病一案證甚危舌黑而枯滿舌遍裂人字紋曰脈不必診也此虛寒證誤用芩連無救矣病家固請一診曰脈隱而難憑不若舌之顯而有據也何必診窬日果歿又治張學海病微寒壯熱頭痛昏沉服發散藥數劑目瞪而聾熱猶熾油汗如珠譫語撮空惡候悉具其脈洪大疾而空其舌乾黃焦燥而胖諸醫金擬白虎承氣楊獨以養榮湯用參附各三錢與之曰服此後當得睡睡醒則諸脈俱靜諸病俱退而舌變嫩紅滑潤矣翌日復診果如所言蓋病有真假憑諸脈脈有真假憑諸舌如系實證則脈必洪大躁疾而重按愈有力如系實火則舌必乾燥焦黃而斂縮且堅卓豈有重按而脈全無滿舌俱胖尚得謂之實證也仍用原方減去參附各一半數劑而愈按此案議論甚創辨舌數言亦發諸家所未發醫者如遇此等脈證所當細審也平脈病脈今世盛行之脈訣乃高陽生所撰而僞託王叔和之名者元委戴啓宗同父曾著脈訣刊誤一書以正之汪石山為之補正並附所撰矯世辨惑論於後而為之敘略謂俗間所傳脈訣辭最鄙淺非叔和本書殊不知叔和所輯者脈經也當叔和時未有歌括此蓋後人特假其名以取重於世耳托為韻語取便講習故人以能口熟脈訣為能而不復窮其經之為理也同父因集諸家之論正於歌括之下勒為成書誠診家之至要云明李時珍復撮舉其父言聞四診發明著瀕湖脈學一卷釋論二十七種脈象頗為精核並附載崔嘉彥及諸家考證脈訣之說以互相發明四庫提要醫家類謂是書一出脈訣遂廢其廓清醫學之功亦不在啓宗下也云然診脈必先知常乃能通變能熟習平人之脈即易辨病人之脈故用功在平時不在臨時周夢覺三指禪曰二十七脈以緩為極平脈餘二十六為病脈定清緩脈方可定諸病脈精熟緩脈即可以知諸病脈脈之有緩猶權度之有平定星也夫緩者不浮不沉恰在中取不遲不數正好四至欣欣然悠悠然從容柔順圓淨分明微於緩者即為微細於緩者即為細虛實長短弦弱滑澀無不皆然至於芤革緊散濡牢洪伏促結動代為緩為權度尤其顯而易見者也又程觀泉諸脈條辨乃衷輯景嶽士材之書而成言頗簡切如謂浮脈輕手便得非必中沉俱無如崔氏云有表無里有上無下則脫然無根混於散脈矣洪脈只是腳根潤大卻非堅硬若大而堅硬則為實脈矣濡脈浮軟與虛脈相類但虛脈形大而濡脈形小也濡脈之細小與弱脈相類但弱在沉分而濡在浮分也樹以根深為牢蓋深入於下者也監獄以禁固為牢蓋深藏於內者也仲景云寒則牢堅又有堅固之義以牢脈與革脈議論則革浮而牢沉革虛而牢實脈象不同為病亦異不可混也緊脈熱為寒束故其象繃急而不寬舒實脈邪為火迫故其象堅滿而不柔和微脈模糊難見細脈則顯而易見故細比於微稍稍加大也陰寒之證脈必見遲然與緩脈絶不相類蓋緩以其形之寬縱得名遲以至數不及為義醫者於各種脈象必須嚴為分別不可稍有含混否則認脈既差為治亦誤矣脈之虛實仲景論脈以浮大滑動數為陽沉弱澀遲為陰柯韻伯以六法釋之無餘蘊矣然脈與證宜合參脈證相應辨治弗難第病情隱伏頭緒紛繁脈理淵深推測匪易先以虛實言之證虛脈虛證實脈實其常也若證則實矣而脈似虛或證則虛矣而脈似實其將何說以通之不知脈證詎有相反之理蓋所謂病實脈虛者其脈或隱伏難尋或至數模糊或澀滯不利雖似乎虛而非虛也若丹溪論澀脈曰人之所藉以為生者血與氣也或因憂鬱或因厚味或因無汗或因補劑氣騰血沸清化為濁老瘀宿痰膠固雜揉脈道阻澀不能自行亦見澀象若重取至骨來似有力參之於證驗之形氣但有熱證當作錮熱治之葉香岩論喉閉證曰暴病暴死皆屬於火火鬱於內不能外達故似寒證經絡不通脈道不行多見沉澀無火之脈非虛也易思蘭曰凡遇極微之脈久久尋之而得於指稍稍加力按之至骨愈堅牢者乃伏匿之脈陽鬱極矣豈可認作虛寒凡此皆氣機鬱滯脈道不利所致切忌誤作虛治若證虛而脈似實者或浮大而數按之豁然或鼎指洪盛而重取則絶乃陽氣浮散於外而裡虛所致此則似實而非實也至於虛實不相應脈證悉相反者自非佳兆又不可並此同論矣傷食脈澀仲景以脈滑者遲實者緊而轉索無常者主宿食夫人而知之惟脈浮而大按之反澀尺中亦微而澀亦主宿食則知者鮮矣張石頑治汪五符夏月傷食六脈模糊尋之似有如無自認陰寒而服五積散病遂劇葉陽生以為傷暑而與香薷飲遂頭面汗出如蒸程郊倩以其證大熱而脈息模糊按之殊不可得以為陽欲脫亡之候欲猛進人參附子沈明生以陰證無汗出如蒸之理脈雖虛而證大熱當用人參白虎相持未下乃取決於石頑診之六脈雖澀弱模糊而心下按之大痛舌上灰刺如芒乃食填中宮不能鼓運其脈也以涼膈散下之一下神思大清脈息頓起當知傷食之脈雖氣口滑盛若屢傷不已每致澀數模糊乃脾不消運之兆此證若非下奪而與參附助其壯熱則頃刻立斃矣戰汗脈伏傷寒邪不內傳其人胃氣復則汗解而不戰胃氣雖復而未充邪氣將退而未散邪正搏結漸通鬱滯漸散始戰汗而愈滑伯仁曰傷寒家服藥後身熱煩燥發渴冒瞀兩手脈忽伏而不見惡寒戰栗此皆陰陽氖氫正邪相爭作汗之徵也魏玉璜曰病有脈雙伏或單伏而四肢厥冷或爪甲青紫欲戰汗也吳又可曰發汗之理自內以達表若裡氣壅滯陽氣不能敷布於外即四肢未免厥逆又安能氣液蒸蒸以達表譬如縛烏之足乃欲飛升其可得乎蓋鳥之將飛其身必伏先縱足而後揚翅方得升舉此戰汗之義也又欲作戰汗之時慎勿以藥擾之故張石頑但主熱薑湯助其驅邪之力義可見矣溫病譫語陸九芝世補齊醫書論溫病譫語歸本陽明一以硝黃為正治深叱葉香岩逆傳心包之非學者多宗之青浦陸士諤曰溫病譫語有陽明厥陰之別陽明證斷不能投厥陰劑厥陰證斷不能投陽明劑一主硝黃蕩滌一主犀角開透誤投皆有弊害辨別之法凡厥陰心包之譫語是昏不識人雖喚之不醒是神明已蔽之鐵證陽明之譫語呼之即醒呼過仍譫語如舊足徵神明未盡蔽也雖同屬譫語而兩證判若天淵足見九芝專以硝黃為治者仍未盡善然陽明譫語雖呼之即醒而病重者亦間有呼之不應若只以呼之醒與不醒為別似亦難憑雖知陽明諺語以胃家實為本柯韻伯所謂只因有胃家實之病根即有胃家實之病情是也若厥陰心包之譫語則以熱傳營分痰蔽清陽為主亦必各有本證可辨羅伯夔曰溫邪傳入氣分熱結胃腑腹滿譫語舌苔黃厚而燥脈沉實宜蕩滌熱邪承氣湯主之若熱邪入營血液受劫舌色純絳神昏譫語者宜清營熱佐以宣竅犀角地黃湯加味送至寶丹牛黃丸等主之余謂傷寒論三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿汗出白虎湯主之一節亦是陽明證特承氣則責在燥屎此則責在熱氣耳故溫病譫語不獨有厥陰陽明之別即同屬陽明亦有承氣與白虎之分他如葉香岩治濕熱作痞神識如蒙有瀉心法玉潛齊治痰熱交結閉塞心包有小陷胸合蠲飲六神法皆宜博考至若雜證中譫語仍當以雜證法治之又不可與溫熱門中譫語同論也三消屬火飲不解渴為上消多食不為肌膚曰中消小便如膏飲一溲一曰下消皆熱證也劉河間宣明論隸諸燥門其義可見而三消論闡發尤詳謂治消渴者當補腎水陰寒之虛瀉心火陽熱之實除腸胃燥熱之甚濟一身津液之衰使道路散而不結津液生而不枯氣血利而不滯則其病日已矣又釋下消溲數之故謂燥熱太甚而三焦腸胃之腠理怫鬱結滯密緻壅塞水液不能滲泄浸潤於外以榮養百骸故腸胃之外燥熱太甚雖復多飲於中終不能浸潤於外故渴不止小便多出者為其多飲不能滲泄於腸胃之外故溲數也其說頗精張子和亦以三消從火斷謂五行之中惟火能焚物六氣之中惟火能消物故火之為用潘木則消而為炭焚土則消而為伏龍肝鍊金則消而為汁煅石則消而為灰煮水則消而為湯煎海水則消而為鹽干汞則消而為粉熬錫則消而為丹故澤中之潦涸於炎暉鼎中之水干於壯火夫火得其平則熟煉飲食糟粕去焉不得其平則燔灼臟腑而津液竭焉以故入水之物無物不長入火之物無物不消故一身之火甚於上則為膈膜之消甚於中則為腸胃之消甚於下則為膏液之消其言甚精後世以內經有心火移寒飲一溲二之說金匱有男子消渴小便反多飲一斗小便亦一斗腎氣丸主之一節遂謂消渴有寒證戒用清涼何夢瑤辨之曰金匱所言乃因其人命門火衰不能蒸動腎水與脾胃中谷氣以上達於肺故上焦失潤而渴其所飲之水未經火化直下膀胱故飲一溲一其味不咸腎氣丸以壯其命門之火如釜底加薪則水穀之氣上騰蒸為潤澤也然此證只因水不上滋而渴非如盛火之焚灼則其渴不甚飲亦必不多其謂飲一斗便一斗乃合計之詞非言每飲輒一斗也其與熱證之大渴引飲者安得無殊耶且腎熱則小便如膏腎寒則小便清白又自有辨也至內經所言心火衰微反為水冷金寒之化不特所飲之水無氣以化即身中之津液亦無氣提攝相併下趨而成飲一溲二之證則肺氣之消索已極尚何大渴大飲之有似皆不當名為消渴以至後人涇渭不分動手溫補熱證逢之不死何待此辨最為精切此外更有可笑者謂腎氣丸乃仲景立以治武帝消渴而設是未考建安為何人年號而二人相去且三百餘年不知其何能相值於一時章杏云曰醫師所列諸方嘗有某帝王某卿相試驗之說皆是遊方術士虛張聲勢哄騙鄉愚之法理或然歟黃帝內經孟子曰盡信書不如無書柯韻伯曰讀書無眼病人無命蓋謂古書不可盡信而讀書須具隻眼也內經十八卷為醫書之鼻祖王太僕謂其文簡其意博其理奧其趣深故歷數千年醫家尊之莫敢或二然謂其為歧黃遺書究屬可疑薛生白曰其書乃成於不知何代明夫醫理托為君臣問答之詞而傳於民者蓋其時始命大撓作甲子其干支節序占候豈符於今日而旨酒溺生禹始惡之當其玄酒味溏人誰嗜以為漿以致經滿絡虛肝浮膽橫耶至於十二經配十二水名彼時未經地平天成何以江淮河濟方隅珍域竟與後世無岐如此罅漏不一而足史琦曰醫籍之古無如神農本草靈素難經後之言醫者莫敢違也以為此神農黃帝越人之傳秦火未亡者可深信也夫文字之古無如羲畫而羲畫無言語其次則尚書然而尚書積千百年之久匯四代之籍而文不滿數萬即雲散失者多而其完善者固班班可考也即就禹貢一篇而論蓋完善也平地成天之略稍衍之百萬言不足盡今乃簡略若是況以在黃農之世作醫者之書其文辭不當益簡耶而靈素之文纍數十萬字義條暢仿之月令樂記之文抑又何歟漢世鷹緯諸書盡托古聖儒者且不難誣聖況方士乎哉況漢之方士其敢於欺世如文成五利之後徒概不少矣馬端臨號稱博雅其文獻通考之敘書籍也謂醫卜種樹之書當時雖未嘗廢錮而並無一卷流傳至今當宋元之際靈素本草已大行豈得曰並無一卷流傳蓋馬氏固疑之矣神農經每藥必曰久服輕身延年雖毒藥亦云此正方士口語靈素明經絡臟腑驗之人身多齟齬出入其疾病治療亦或效或否而難經則竊靈素之緒以衍之司馬遷傳扁鵲言其特假診脈為名然則即令難經出扁鵲已非心傳況又近贋乎余謂學術隨時代而進化千年古籍必難免有不盡不實之處後人自當辨其疑似重補修正去僞存真方為首務觀內經所載脈絡骨度營衛生會等證以解剖生理學顯有出入如謂人一日一夜一萬三千五百息試問平人每日呼吸豈有此數此數既差則漏水下百刻營衛五十度周於身之說亦必不確他如天有日月人有兩目地有九洲人有九竅等雖云取譬究屬無謂司天在泉天符歲會亦與人體無關張飛疇何夢瑤曾論之而人身之骨全體連目耳部之三小骨不過二百零八件而書則作三百六十五節以附會一歲之三百六十五日更可議者如雲胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升以及大小腸之尺度等皆不可信然數千年前之解剖術當然不及今日之精即權衡度量亦與今異其能定出臟腑名目足見當日確曾將人體剖視觀靈樞經脈篇曰夫八尺之士皮肉在此外可度量切循而得之其死可解剖而視之之言可知後世以解剖為有傷人道誰肯遵行故其書類此之誤至今未破清道光時王清任著醫林改錯力闢古書論臟腑之謬而以所親見者繪圖而說明之嘗謂論病不知臟腑如癡人說夢治病不知臟腑如盲子夜行其革新醫學之功實在不小雖仍多未盡善而其志可嘉也後唐宗海中西匯通五書嘗引王說兼採泰西生理諸書而折衷之亦多所發明惜其尊經過甚處處務求與經論相合附會武斷之處不一而足遂為陳邦賢盧豫甫所譏故余嘗謂習中醫者宜兼參西學則於古書之謬誤自不致於承訛而所學必更有進者語云他山之石可以攻玉有志之士其勉之哉石山醫案汪石山醫案三卷案中以參耆奏效者居其強半或則疑其偏於溫補或則泥其法以誤人是皆不得汪氏之意耳觀其凡以參耆主治者其載脈不曰浮濡即曰虛數無力此正氣虛之確據且雖以參耆為主然不輔以桂附之辛熱而佐以麥冬黃柏之甘昔寒即制方之緩急輕重佐使先後皆有法度洵非淺識所能步武其門弟子程延彝亦曰先主治病多用參耆蓋其病已遍試諸醫歷嘗諸藥非發散之過則降泄之多非傷於剛燥則損於柔潤胃氣之存也幾希矣而先生最後至不得不用參耆以救胃氣實出於不得已非性偏也觀此知汪氏非執板方以試病者獨怪其營衛論中有曰人於日用之間不免勞則氣耗悲則氣消恐則氣下怒則氣上思則氣結喜則氣緩凡此數傷皆傷氣也以有涯之氣而日犯此數傷欲其不虛難矣虛而不補氣何由行則正言氣虛而宜用參耆者也姑無論氣上氣結之因於思怒者不可妄補然尚不失為論氣之言惟下文則曰衛固陽也營亦陽也又曰補陽者補營之陽補陰者補營之陰又曰譬如天之日月皆在大氣之中分而言之日為陽月為陰合而言之月雖陰而不稟日之陽則不能光照而運行矣故古人於陰字下加一氣字可見陽固此氣陰亦此氣也是則混營衛陰陽為一矣故其下再曰是知人參黃耆補氣亦補營之氣補營之氣即補營也補營即補陰也豈非太含混乎昔董載臣論婦人暈厥者謂宜逍遙散為主輕則合四物重則合六味加黃連云極有效驗王潛齊正之曰如果腎水虧少肝枯木動之暈眩惟集靈膏瓊玉膏甘露飲固本丸等為宜逍遙四物如何有效董氏所云乃血虛暈眩也是則不獨營衛氣血宜分論即血之與陰仍有分際豈如汪氏之混而莫別乎丹溪學說丹溪陽有餘陰不足論謂人自有生以後端賴水穀以養男二八女二七而精通經至陰氣始成及男八八女七七而精絶經斷夫陰氣之成只供給得三十年之視聽言動此難成易虧之陰詎可不加保養哉又其茹談論謂谷菽果菜為開賦之味自然沖和有養人補陰之功揆其意以精血化生於水穀故純以飲食為補此深得子和之法者也後人不達其義見其補陰丸中用知柏即援以為例及治而誤事竟不咎己之審證不明而咎丹溪立方以誤世甚有醜詆謾罵不遺餘力如黃元御張景嶽輩其尤者也不知丹溪之用知柏原以治陰虛火亢能食便艱之證非概治一切陰虛而脾胃不實之證也又其醫案中言陰虛者每用參術為治蓋以脾在六經為足太陰內經所謂陰中之至陰也胃納脾運胃降脾生水穀腐化精血賴以資生設若勞倦內傷虛耗脾氣則飲食不能腐化而精血虛矣故用參術以助脾之用乃不易之定法則知其所云陰虛乃指足太陰脾臟之虛而言與陰虛火亢治宜清滋之陰虛不同也後之虞夭民汪石山雖有論列惜皆未明斯義陳修園雖知補脾為補陰亦矯枉過正一若補脾之外其它補陰之法均可不講故王子能謂人之才識學力各有能至不能至真知言哉東垣方法李東垣發明補脾升陽之法以治勞倦致虛脾陽下陷之證其功甚大至脾胃論雖以脾胃並舉立名蘭室祕藏雖知歸本脾胃其實只明治脾之法而治胃之法則闕焉不詳且其立方多雜群隊之藥徐靈胎曾譏其駁雜而不拘何病立方必兼升散之藥數種後賢如陸麗京魏玉衰章杏云嘗非議之試以其所立諸方而論清暑益氣湯雖以清暑為名卻無清暑之實補中益氣湯只可治虛人外感及脾陽不升之病升陽益胃湯瀉陰火升陽湯等則藥太龐雜誠如徐氏所譏矣抑嘗論之凡病屬脾氣下陷者升陽之法原不可廢但不可誤施於溫熱門中耳蓋東垣生平獨得力於此法故其所論不外發明斯義非治病之全體也而四庫全書醫家類謂其制方君臣佐使相制相用條理整然他人罕能效之者斯則事由神解不涉言詮云未免推許過當實未敢贊同也溫病條辨吳鞠通溫病條辨力辨寒溫之異多所發明論藥亦多精妙解産難解兒難兩篇皆屬可傳之作顧條辨一書簡誤之處亦在不少詳見王潛齊歸硯録章虛谷醫門棒喝中著書之難古今同患詎不信哉然條辨之未盡善實吳氏自取之咎古越曹炳章謂當時吳以省墓回紹城與任濟堂先生善因出條辨一書互相辨析任君獨贊解産難解兒難兩篇余則謂自條自注著書無此成例且其中缺誤處甚多雲由是拂其意交遂疏蔣湖書屋主人謂吳性剛氣做洵不誣也故惟其性剛乃不能容物氣做則自視過高雖得良友亦無從獲益設當日能虛心下問互相切磋研究棄瑕取瑜重為編訂當能免此遺憾今則長留缺點為後人駁難未免不值矣跋范文正公曰不為良相當為良醫蓋良醫活人良相治國其要一也劊於課餘之後常侍家君診證每見有扶掖而來者背負而來者輿乘車載而來者或喘或咳或暈眩嘔吐或熱極煩躁坐立不安為狀至苦家君一一為之詳辨脈證分別擬方與之明日再來則病已輕減更數日遂漸痊愈釗見之極感興趣所謂良醫活人者非耶然又見頑痼之疾非一二劑所能奏效者家君必發篋取書詳細參究有時至廢寢食既而治愈則津津樂道其診斷處方之經過若不勝愈快者惟其如是故年甫四十而發半斑白此皆勞惱焦思所致不肖等屢請節勞家君惟頷之而已嘗詔不肖等日醫者半以謀衣食半以活人且醫為性命之學萬不能苟且從事不特診證擬方須極端審慎即平日研究醫理亦須痛下功夫惟勤之一字實為治學之根本要知凡學皆不能僥幸得來者一分勤學一分成就十分勤學十分成就不獨醫學為然其他學術莫不然也汝等有志於學必須以此自勉不肖等敬謹遵諾不敢或忘是知家君醫學之成就全由刻苦用功得來非可幸致也今以其所積存醫案擇取四十則刊表於世此皆歷來治驗之成績知醫者讀之可增加其學識不知醫者讀之亦可明醫藥之得失並附醫話一卷為早年習醫札記所成其中言論皆有根據足裨實用然則家君是書其必永傳於世也夫他日人手一編與金石同壽是不肖等之私願矣全書校閲既竟敬附數言於書末以志不忘焉次男啓釗敬跋
